services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/btg_fondos
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-must-be-at-least-32-bytes-long!!}
      SERVER_PORT: "8000"
    depends_on:
      - mongo

volumes:
  mongo_data:
